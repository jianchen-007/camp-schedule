# Fully automated daily schedule updates.
#
# Camp staff drop the day's Whatzappening sheet (PDF or photo, any file name)
# into the shared Google Drive folder around 5:45pm PT. This workflow checks
# the folder shortly after, transcribes anything new with the Anthropic API,
# updates data.json, bumps the service-worker cache, and pushes to main —
# which IS the deployment (GitHub Pages).
#
# Requires ANTHROPIC_API_KEY plus ONE Google credential secret:
#   GDRIVE_SERVICE_ACCOUNT — service-account key JSON with Viewer access (private folder), or
#   GDRIVE_API_KEY         — plain Google API key (folder must be "Anyone with the link: Viewer")
#
# Runs are cheap no-ops when the folder has nothing new. Trigger manually any
# time from the Actions tab ("Run workflow").

name: Auto-update schedule from Drive

on:
  schedule:
    - cron: '45 0 * * *'  # 5:45pm PT (00:45 UTC next day) — staff publish around now
    - cron: '0 1 * * *'   # 6:00pm PT (01:00 UTC next day)
    - cron: '15 1 * * *'  # 6:15pm PT (01:15 UTC next day)
    - cron: '0 3 * * *'   # 8:00pm PT (03:00 UTC next day) — catches late uploads
  workflow_dispatch:
  push:
    branches: [main]
    paths:                # self-test on pipeline changes; bot commits don't match
      - '.github/workflows/daily-schedule-update.yml'
      - 'scripts/update-schedule.mjs'

concurrency:
  group: schedule-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # branch tip at run START, not the stale SHA snapshotted when a delayed cron queued

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch and transcribe new sheets
        run: node scripts/update-schedule.mjs
        env:
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
          GDRIVE_API_KEY: ${{ secrets.GDRIVE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and deploy
        run: |
          if git diff --quiet && git ls-files --others --exclude-standard | grep -q . ; then :; fi
          if [ -z "$(git status --porcelain)" ]; then
            echo "Nothing new — no deploy."
            exit 0
          fi
          git config user.name "camp-schedule-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json sw.js .bot/
          git commit -m "Auto-update schedule from new Whatzappening sheet"
          git push || (git pull --rebase origin main && git push)
